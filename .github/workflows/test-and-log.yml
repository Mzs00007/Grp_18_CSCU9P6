name: Test and Log Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-log:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 2 # Fetch the last 2 commits so we can diff them
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Code
      run: |
        mkdir -p out
        javac -d out $(find src/main/java -name "*.java")
        
    - name: Run Tests (with Logging)
      run: |
        # In a real scenario, this runs your test suite or main app
        java -cp out vcfs.App
        
    - name: Capture Git Context Pipeline Data
      if: always()
      run: |
        echo "=============================================" > logs/commit-context.txt
        echo " BUILD FAILED OR COMPLETED " >> logs/commit-context.txt
        echo "=============================================" >> logs/commit-context.txt
        echo "Author (Pushed by): ${{ github.actor }}" >> logs/commit-context.txt
        echo "Commit SHA: ${{ github.sha }}" >> logs/commit-context.txt
        echo "Event: ${{ github.event_name }}" >> logs/commit-context.txt
        echo "Branch/Ref: ${{ github.ref }}" >> logs/commit-context.txt
        
    - name: Extract Code Changes (Diff)
      if: always()
      run: |
        # Use git to output the exact lines of code that changed in the last commit
        git diff HEAD~1 > logs/code-changes.diff || echo "Make sure there are at least two commits in the branch." > logs/code-changes.diff
        
    - name: Upload System Logs & Git Blame Context
      if: always() # This ensures logs upload even if the previous step crashes!
      uses: actions/upload-artifact@v3
      with:
        name: system-logs
        path: logs/
        retention-days: 7
        
    - name: Publish Job Summary
      if: always()
      run: |
        echo "## 🚨 Pipeline Diagnostic Report" >> $GITHUB_STEP_SUMMARY
        echo "**Author (Pushed by):** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Event type:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "Please download the \`system-logs\` artifact at the bottom of this page to see the full crash logs and exact code diffs." >> $GITHUB_STEP_SUMMARY
        
    - name: Auto-Create GitHub Issue on Failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh issue create \
          --title "🚨 Build Failure triggered by ${{ github.actor }}" \
          --body "The CI/CD pipeline failed on commit ${{ github.sha }}.<br>Please check the actions tab and download the **system-logs** artifact to diagnose the Java exception and Git code changes." \
          --assignee "${{ github.actor }}"
